name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Install project dependencies
        run: |
          # Install project dependencies if they exist
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Validate pyproject.toml
        run: |
          python -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))" || \
          python -c "import tomli; tomli.load(open('pyproject.toml', 'rb'))" || \
          echo "✅ pyproject.toml validation requires tomllib (Python 3.11+) or tomli"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install pytest if tests directory exists
          if [ -d "tests" ] || find . -name "test_*.py" | grep -q .; then
            pip install pytest
          fi

      - name: Run tests
        run: |
          if [ -d "tests" ] || find . -name "test_*.py" | grep -q .; then
            echo "🧪 Running tests..."
            pytest -v || echo "⚠️ Tests failed or no tests found"
          else
            echo "ℹ️ No tests found, skipping test execution"
          fi
